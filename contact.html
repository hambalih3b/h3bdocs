<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H3bDocs — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .contact-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 24px 20px;
      margin-bottom: 18px;
    }
    .contact-card h2 {
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* social buttons */
    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      text-decoration: none;
      color: var(--text);
    }
    .social-btn:hover  { border-color: var(--teal); box-shadow: var(--shadow-sm); }
    .social-btn:active { transform: scale(.95); }
    .social-btn .soc-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .social-btn .soc-label {
      font-family: var(--font);
      font-size: .82rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .social-btn .soc-sub {
      font-size: .72rem;
      color: var(--text-muted);
    }

    /* send button state */
    .send-btn {
      width: 100%;
      padding: 15px;
      font-size: 1rem;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--teal), var(--teal-light));
      color: #fff;
      font-family: var(--font);
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: 4px;
    }
    .send-btn:active { transform: scale(.98); }
    .send-btn:hover  { opacity: .9; }
    .send-btn.sent {
      background: linear-gradient(135deg, #2a9d5c, #38c97a);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="h3b-header">
    <div class="h3b-header-left">
      <h1>Contact</h1>
      <p>On est là pour vous</p>
    </div>
    <div class="h3b-logo-badge">H3bD</div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="h3b-content">

    <!-- Message form -->
    <div class="contact-card fade-up fade-up-1">
      <h2>📝 Envoyez-nous un message</h2>

      <div class="h3b-input-group">
        <label>Votre nom</label>
        <input type="text" id="name" placeholder="Ex : Fatima Moussa" required>
      </div>

      <div class="h3b-input-group">
        <label>Adresse email</label>
        <input type="email" id="email" placeholder="votre@email.com">
      </div>

      <div class="h3b-input-group">
        <label>Message</label>
        <textarea id="message" placeholder="Posez votre question ou proposez un document…"></textarea>
      </div>

      <button class="send-btn" id="sendBtn" onclick="sendViaWhatsApp()">
        Envoyer via WhatsApp →
      </button>
    </div>

    <!-- Social channels -->
    <div class="contact-card fade-up fade-up-2">
      <h2>📲 Nous retrouver sur</h2>
      <div class="social-grid">

        <button class="social-btn" onclick="contactWhatsApp()">
          <div class="soc-icon" style="background:rgba(37,211,102,.12)">💬</div>
          <div>
            <div class="soc-label">WhatsApp</div>
            <div class="soc-sub">Message direct</div>
          </div>
        </button>

        <button class="social-btn" onclick="contactFacebook()">
          <div class="soc-icon" style="background:rgba(24,119,242,.12)">📘</div>
          <div>
            <div class="soc-label">Facebook</div>
            <div class="soc-sub">Page officielle</div>
          </div>
        </button>

        <button class="social-btn" onclick="contactGmail()">
          <div class="soc-icon" style="background:rgba(234,67,53,.12)">📧</div>
          <div>
            <div class="soc-label">Gmail</div>
            <div class="soc-sub">Email</div>
          </div>
        </button>

        <button class="social-btn" onclick="contactPhone()">
          <div class="soc-icon" style="background:rgba(10,124,124,.12)">📞</div>
          <div>
            <div class="soc-label">Appel</div>
            <div class="soc-sub">+227 86 56 80 27</div>
          </div>
        </button>

      </div>
    </div>

    <div class="h3b-footer">© 2026 H3bDocs · Made with ❤️ by RIH</div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="h3b-nav">
    <a href="fUpload.html">
      <span class="nav-icon">🏠</span>
      <span>Accueil</span>
    </a>
    <a href="files.html">
      <span class="nav-icon">📁</span>
      <span>Fichiers</span>
    </a>
    <a href="apropos.html">
      <span class="nav-icon">ℹ️</span>
      <span>À propos</span>
    </a>
    <a href="contact.html" class="active">
      <span class="nav-icon">✉️</span>
      <span>Contact</span>
    </a>
  </nav>

  <script>
    function getFields() {
      return {
        name:    document.getElementById('name').value.trim(),
        email:   document.getElementById('email').value.trim(),
        message: document.getElementById('message').value.trim(),
      };
    }

    function sendViaWhatsApp() {
      const { name, message } = getFields();
      if (!name || !message) {
        alert('Merci de remplir au moins votre nom et votre message.');
        return;
      }
      const btn = document.getElementById('sendBtn');
      btn.textContent = '✓ Message envoyé !';
      btn.classList.add('sent');
      setTimeout(() => {
        btn.textContent = 'Envoyer via WhatsApp →';
        btn.classList.remove('sent');
      }, 3000);
      const text = `Bonjour, je suis ${name}.\n\n${message}`;
      window.open(`https://wa.me/+22786568027?text=${encodeURIComponent(text)}`, '_blank');
    }

    function contactWhatsApp() {
      const { name, message } = getFields();
      const text = name && message
        ? `Bonjour, je suis ${name}.\n\n${message}`
        : 'Bonjour !';
      window.open(`https://wa.me/+22786568027?text=${encodeURIComponent(text)}`, '_blank');
    }

    function contactFacebook() {
      window.open('https://www.facebook.com/profile.php?id=61557409352690', '_blank');
    }

    function contactGmail() {
      const { name, message, email } = getFields();
      const subject = name ? `Message de ${name}` : 'Contact H3bDocs';
      window.open(`mailto:hambalih3b@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`, '_blank');
    }

    function contactPhone() {
      window.open('tel:+22786568027', '_blank');
    }
  </script>
</body>
</html>
